<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7C3AED" />
    <meta
      name="description"
      content="DXIR Analytics - full-screen real-time CPU and RAM monitoring graph."
    />
    <title>DXIR STATS | Analytics</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230F172A'/%3E%3Cpath d='M18 34h28v6H18zM18 24h18v6H18z' fill='%237C3AED'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/style.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script defer src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <script defer src="/nav.js"></script>
    <script defer src="/analytics.js"></script>
  </head>
  <body data-page="analytics">
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('dxir-theme');
          document.body.classList.toggle('light', theme === 'light');
        } catch (error) {
          // Ignore storage errors.
        }
      })();
    </script>

    <div class="app-layout">
      <aside class="sidebar" id="sidebarNav">
        <div class="sidebar-brand">
          <div class="brand-mark" aria-hidden="true"><span></span></div>
          <div>
            <p class="eyebrow">Navigation</p>
            <h2>DXIR STATS</h2>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Main menu">
          <a class="sidebar-link" data-nav="dashboard" href="/">
            <span class="sidebar-link__icon" aria-hidden="true">◧</span>
            <span>Dashboard</span>
          </a>
          <a class="sidebar-link" data-nav="players" href="/#players-section">
            <span class="sidebar-link__icon" aria-hidden="true">◎</span>
            <span>Players</span>
          </a>
          <a class="sidebar-link" data-nav="leaderboard" href="/leaderboard">
            <span class="sidebar-link__icon" aria-hidden="true">◈</span>
            <span>Leaderboard</span>
          </a>
          <a class="sidebar-link is-active" data-nav="analytics" href="/analytics">
            <span class="sidebar-link__icon" aria-hidden="true">▣</span>
            <span>Analytics</span>
          </a>
          <a class="sidebar-link" data-nav="settings" href="/#settings-section">
            <span class="sidebar-link__icon" aria-hidden="true">⚙</span>
            <span>Settings</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false">
            <span class="theme-toggle__icon" aria-hidden="true">☾</span>
            <span id="themeToggleLabel">Light mode</span>
          </button>
        </div>
      </aside>

      <button class="sidebar-overlay" type="button" data-sidebar-close aria-label="Close navigation"></button>

      <main class="app-shell analytics-shell">
        <header class="topbar card analytics-topbar">
          <button class="sidebar-toggle" type="button" data-sidebar-toggle aria-label="Open navigation">☰</button>

          <div class="topbar-copy">
            <p class="eyebrow">Real-time server monitoring</p>
            <h1>DXIR Analytics</h1>
            <p class="header-copy">Full-screen live CPU and RAM graph with smooth streaming animation.</p>
          </div>

          <div class="analytics-topbar-actions">
            <a class="theme-toggle" href="/" aria-label="Back to dashboard">&larr; Dashboard</a>
            <div class="connection-pill" id="analyticsLivePill" data-state="loading">
              <span class="connection-pill__dot"></span>
              <span id="analyticsLiveLabel">LIVE</span>
            </div>
          </div>
        </header>

        <section class="card analytics-graph-card" aria-label="Full screen analytics graph">
          <div class="card-head analytics-controls-head">
            <div>
              <p class="stat-kicker">Controls</p>
              <h2 class="stat-title">CPU / RAM Stream</h2>
            </div>
            <div class="analytics-controls" role="group" aria-label="Graph controls">
              <label class="analytics-toggle"><input id="toggleCpu" type="checkbox" checked /> CPU</label>
              <label class="analytics-toggle"><input id="toggleRam" type="checkbox" checked /> RAM</label>
              <button class="theme-toggle analytics-btn" id="pauseGraphBtn" type="button">Pause</button>
              <button class="theme-toggle analytics-btn" id="clearGraphBtn" type="button">Clear</button>
            </div>
          </div>

          <div class="analytics-meta-row">
            <span id="analyticsCpuText">CPU: --%</span>
            <span id="analyticsRamText">RAM: -- GB</span>
            <span id="analyticsSourceText">Source: connecting...</span>
          </div>

          <div class="analytics-chart-wrap">
            <canvas id="analyticsChart" aria-label="Full-screen CPU and RAM analytics chart" role="img"></canvas>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
